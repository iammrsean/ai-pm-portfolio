<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宜人财富 8.0 改版 · 案例详情</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0f1e;
    --accent:#6366f1;
    --accent2:#818cf8;
    --text:#f1f5f9;
    --muted:#94a3b8;
    --border:#1e2d45;
    --card:#131c2e;
  }
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
  a{color:inherit;text-decoration:none}
  nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(10,15,30,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .nav-inner{max-width:900px;margin:0 auto;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;height:60px}
  .back-btn{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--muted);transition:color .2s}
  .back-btn:hover{color:var(--text)}
  .nav-logo{font-size:14px;color:var(--muted)}
  .page{max-width:900px;margin:0 auto;padding:100px 2rem 5rem}
  .tag{font-size:11px;padding:3px 10px;border-radius:100px;border:1px solid var(--border);color:var(--muted)}
  .tag.ai{border-color:rgba(99,102,241,.4);color:var(--accent2);background:rgba(99,102,241,.08)}
  .hero-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
  h1{font-size:clamp(2rem,5vw,3rem);font-weight:700;line-height:1.15;margin-bottom:1rem}
  h1 span{color:var(--accent2)}
  .hero-desc{font-size:1.05rem;color:var(--muted);max-width:none;width:fit-content;margin-bottom:2.5rem}
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:3rem}
  .meta-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
  .meta-label{font-size:12px;color:var(--muted);margin-bottom:.25rem}
  .meta-value{font-size:15px;font-weight:600}
  .gallery-title{font-size:13px;color:var(--accent2);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1.25rem}
  .screens{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
  .screen-item{border-radius:12px;border:1px solid var(--border);overflow:hidden}
  .screen-item img{width:100%;height:auto;display:block}
  .gallery{display:flex;flex-direction:column;gap:1.25rem;margin-bottom:3rem}
  .gallery-item{border-radius:12px;border:1px solid var(--border);overflow:hidden}
  .gallery-item img{width:100%;height:auto;display:block}
  .section-label{font-size:13px;color:var(--accent2);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem;margin-top:2rem}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="back-btn" href="../index.html">← 返回作品集</a>
    <span class="nav-logo">常宇龙</span>
  </div>
</nav>
<div class="page">
  <div class="hero-meta">
    <span class="tag">UX 设计</span>
    <span class="tag">C 端</span>
    <span class="tag">金融产品</span>
    <span class="tag">2020</span>
  </div>
  <h1>宜人财富 <span>8.0 改版</span></h1>
  <p class="hero-desc">宜人财富 App 8.0 全面升级，涵盖首页、财富、广场、看点、我的五大核心页面的视觉与交互重设计，提升用户投资体验与内容运营效率。</p>

  <div class="meta-grid">
    <div class="meta-item"><div class="meta-label">项目时间</div><div class="meta-value">2020.11</div></div>
    <div class="meta-item"><div class="meta-label">我的角色</div><div class="meta-value">产品经理</div></div>
    <div class="meta-item"><div class="meta-label">平台</div><div class="meta-value">iOS / Android</div></div>
    <div class="meta-item"><div class="meta-label">公司</div><div class="meta-value">宜信财富</div></div>
  </div>

  <div class="gallery-title">页面展示</div>
  <div class="screens">
    <div class="screen-item"><img src="../images/yiren-home.png" alt="老客首页"></div>
    <div class="screen-item"><img src="../images/yiren-wealth.png" alt="财富"></div>
    <div class="screen-item"><img src="../images/yiren-plaza.png" alt="广场"></div>
    <div class="screen-item"><img src="../images/yiren-discover.png" alt="看点"></div>
    <div class="screen-item"><img src="../images/yiren-mine.png" alt="我的"></div>
  </div>
  <div class="gallery" style="margin-top:1.5rem">
    <div class="gallery-item"><img src="../images/yiren-portfolio.jpg" alt="持仓分析"></div>
    <div class="gallery-item"><img src="../images/yiren-70.jpg" alt="点亮7.0"></div>
  </div>


</div>
</body>
</html>
