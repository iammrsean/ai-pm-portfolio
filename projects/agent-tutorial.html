<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 和工作流教学案例 · 案例详情</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0f1e;
    --accent:#6366f1;
    --accent2:#818cf8;
    --text:#f1f5f9;
    --muted:#94a3b8;
    --border:#1e2d45;
    --card:#131c2e;
  }
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
  a{color:inherit;text-decoration:none}
  nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(10,15,30,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .nav-inner{max-width:900px;margin:0 auto;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;height:60px}
  .back-btn{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--muted);transition:color .2s}
  .back-btn:hover{color:var(--text)}
  .nav-logo{font-size:14px;color:var(--muted)}
  .page{max-width:900px;margin:0 auto;padding:100px 2rem 5rem}
  .tag{font-size:11px;padding:3px 10px;border-radius:100px;border:1px solid var(--border);color:var(--muted)}
  .tag.ai{border-color:rgba(99,102,241,.4);color:var(--accent2);background:rgba(99,102,241,.08)}
  .hero-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
  h1{font-size:clamp(2rem,5vw,3rem);font-weight:700;line-height:1.15;margin-bottom:1rem}
  h1 span{color:var(--accent2)}
  .hero-desc{font-size:1.05rem;color:var(--muted);margin-bottom:2.5rem}
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:3rem}
  .meta-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
  .meta-label{font-size:12px;color:var(--muted);margin-bottom:.25rem}
  .meta-value{font-size:15px;font-weight:600}
  .section-label{font-size:13px;color:var(--accent2);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem;margin-top:2.5rem}
  .section-label:first-of-type{margin-top:0}
  .gallery{display:flex;flex-direction:column;gap:1.25rem;margin-bottom:1rem}
  .gallery-item{border-radius:12px;border:1px solid var(--border);overflow:hidden}
  .gallery-item img{width:100%;height:auto;display:block}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="back-btn" href="../index.html">← 返回作品集</a>
    <span class="nav-logo">常宇龙</span>
  </div>
</nav>
<div class="page">
  <div class="hero-meta">
    <span class="tag ai">Coze</span>
    <span class="tag ai">Dify</span>
    <span class="tag">AI 培训</span>
    <span class="tag">2026</span>
  </div>
  <h1>AI Agent 和<span>工作流教学案例</span></h1>
  <p class="hero-desc">基于 Coze/Dify 为 AI 培训企业搭建的系列教学案例，涵盖智能客服、记账、面试模拟、日历助手、翻译、多功能助手等场景，帮助学员从零上手智能体与工作流搭建。</p>
  <div class="meta-grid">
    <div class="meta-item"><div class="meta-label">项目周期</div><div class="meta-value">2026</div></div>
    <div class="meta-item"><div class="meta-label">我的角色</div><div class="meta-value">产品负责人</div></div>
    <div class="meta-item"><div class="meta-label">平台</div><div class="meta-value">Coze / Dify</div></div>
    <div class="meta-item"><div class="meta-label">案例数量</div><div class="meta-value">6 个场景</div></div>
  </div>

  <div class="section-label">智能客服</div>
  <div class="gallery">
    <div class="gallery-item"><img src="../images/tutorial-cs-1.png" alt="智能客服"></div>
  </div>

  <div class="section-label">记账助手</div>
  <div class="gallery">
    <div class="gallery-item"><img src="../images/tutorial-accounting-1.png" alt="记账 1"></div>
    <div class="gallery-item"><img src="../images/tutorial-accounting-2.png" alt="记账 2"></div>
  </div>

  <div class="section-label">面试模拟</div>
  <div class="gallery">
    <div class="gallery-item"><img src="../images/tutorial-interview-1.png" alt="面试 1"></div>
    <div class="gallery-item"><img src="../images/tutorial-interview-2.png" alt="面试 2"></div>
  </div>

  <div class="section-label">日历助手</div>
  <div class="gallery">
    <div class="gallery-item"><img src="../images/tutorial-calendar-1.png" alt="日历助手"></div>
  </div>

  <div class="section-label">反思翻译</div>
  <div class="gallery">
    <div class="gallery-item"><img src="../images/tutorial-translate-1.png" alt="反思翻译"></div>
  </div>

  <div class="section-label">多功能助手</div>
  <div class="gallery">
    <div class="gallery-item"><img src="../images/tutorial-multi-1.png" alt="多功能助手 1"></div>
    <div class="gallery-item"><img src="../images/tutorial-multi-2.png" alt="多功能助手 2"></div>
  </div>

</div>
</body>
</html>
