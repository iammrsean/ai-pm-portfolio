<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大佬 · AI 模拟思维 · 案例详情</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0f1e;
    --accent:#6366f1;
    --accent2:#818cf8;
    --text:#f1f5f9;
    --muted:#94a3b8;
    --border:#1e2d45;
    --card:#131c2e;
  }
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
  a{color:inherit;text-decoration:none}

  nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(10,15,30,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .nav-inner{max-width:900px;margin:0 auto;padding:0 2rem;display:flex;justify-content:space-between;align-items:center;height:60px}
  .back-btn{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--muted);transition:color .2s}
  .back-btn:hover{color:var(--text)}
  .nav-logo{font-size:14px;color:var(--muted)}

  .page{max-width:900px;margin:0 auto;padding:100px 2rem 5rem}

  .tag{font-size:11px;padding:3px 10px;border-radius:100px;border:1px solid var(--border);color:var(--muted)}
  .tag.ai{border-color:rgba(99,102,241,.4);color:var(--accent2);background:rgba(99,102,241,.08)}

  .hero-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
  h1{font-size:clamp(2rem,5vw,3rem);font-weight:700;line-height:1.15;margin-bottom:1rem}
  h1 span{color:var(--accent2)}
  .hero-desc{font-size:1.05rem;color:var(--muted);max-width:620px;margin-bottom:2.5rem}

  .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:3rem}
  .meta-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
  .meta-label{font-size:12px;color:var(--muted);margin-bottom:.25rem}
  .meta-value{font-size:15px;font-weight:600}

  .gallery-title{font-size:13px;color:var(--accent2);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1.25rem}
  .gallery{display:flex;flex-direction:column;gap:1.25rem;margin-bottom:3rem}
  .gallery-item{border-radius:12px;border:1px solid var(--border);overflow:hidden}
  .gallery-item img{width:100%;height:auto;display:block}

  .cta{text-align:center;padding:2.5rem;background:var(--card);border:1px solid var(--border);border-radius:16px}
  .cta p{color:var(--muted);margin-bottom:1.5rem;font-size:15px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 36px;border-radius:8px;font-size:16px;font-weight:500;background:var(--accent);color:#fff;transition:all .2s}
  .btn:hover{background:var(--accent2);transform:translateY(-2px)}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="back-btn" href="../index.html">← 返回作品集</a>
    <span class="nav-logo">常宇龙</span>
  </div>
</nav>

<div class="page">

  <div class="hero-meta">
    <span class="tag ai">AI 思维</span>
    <span class="tag">C 端</span>
    <span class="tag">角色模拟</span>
    <span class="tag">2026</span>
  </div>
  <h1>大佬 · <span>AI 模拟思维</span></h1>
  <p class="hero-desc">用 AI 模拟各领域大佬的思维方式，输入你的问题，即可获得他们风格的独特解答与视角。</p>

  <div class="meta-grid">
    <div class="meta-item"><div class="meta-label">项目周期</div><div class="meta-value">2026</div></div>
    <div class="meta-item"><div class="meta-label">我的角色</div><div class="meta-value">产品负责人</div></div>
    <div class="meta-item"><div class="meta-label">平台</div><div class="meta-value">Web</div></div>
    <div class="meta-item"><div class="meta-label">核心技术</div><div class="meta-value">LLM / Prompt</div></div>
  </div>

  <div class="gallery-title">产品截图</div>
  <div class="gallery">
    <div class="gallery-item"><img src="../images/大佬.png" alt="大佬主界面"></div>
    <div class="gallery-item"><img src="../images/大佬统计.png" alt="大佬统计"></div>
    <div class="gallery-item"><img src="../images/WX20260515-210218@2x.png" alt="截图 3"></div>
    <div class="gallery-item"><img src="../images/WX20260515-210258@2x.png" alt="截图 4"></div>
  </div>

  <div class="cta">
    <p>感兴趣？立即体验大佬 AI 思维模拟。</p>
    <a class="btn" href="https://dalao.aistone.me" target="_blank">🧠 立即体验</a>
  </div>

</div>

</body>
</html>
